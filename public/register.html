<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký · Hệ thống Quản lý Học vụ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f2b3d 0%, #1b4a6e 100%);
            background-attachment: fixed;
        }
        .card {
            backdrop-filter: blur(2px);
            background: rgba(255, 255, 255, 0.98);
        }
        input, select { transition: all 0.2s; }
        input:focus, select:focus {
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
            border-color: #3b82f6;
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #1d4ed8, #1e3a8a);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md card rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-6">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto shadow-lg">
                <i class="fas fa-user-plus text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold mt-4 text-gray-800">Đăng ký tài khoản</h2>
            <p class="text-gray-500 text-sm">Tạo tài khoản mới trong hệ thống</p>
        </div>
        <form id="registerForm">
            <div class="mb-3">
                <input type="text" id="fullName" placeholder="Họ và tên" class="w-full border border-gray-300 rounded-xl p-3" required>
            </div>
            <div class="mb-3">
                <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full border border-gray-300 rounded-xl p-3" required>
            </div>
            <div class="mb-3">
                <select id="role" class="w-full border border-gray-300 rounded-xl p-3 bg-white">
                    <option value="lecturer">Giảng viên</option>
                    <option value="faculty">Đại diện Khoa</option>
                    <option value="training">Phòng Quản lý Sinh viên</option>
                </select>
            </div>

            <!-- Khoa (chỉ hiện khi chọn faculty) -->
            <div id="facultyGroup" class="mb-3 hidden">
                <select id="facultyName" class="w-full border border-gray-300 rounded-xl p-3 bg-white">
                    <option value="">-- Chọn khoa --</option>
                    <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                    <option value="Điện - Điện tử">Điện - Điện tử</option>
                    <option value="Kinh tế">Kinh tế</option>
                    <option value="Ngôn ngữ">Ngôn ngữ</option>
                </select>
            </div>

            <!-- Giảng viên fields -->
            <div id="lecturerFields" class="hidden space-y-3">
                <input type="text" id="lecturerCode" placeholder="Mã giảng viên" class="w-full border border-gray-300 rounded-xl p-3">
                <input type="date" id="birthDate" class="w-full border border-gray-300 rounded-xl p-3">
                <select id="department" class="w-full border border-gray-300 rounded-xl p-3 bg-white">
                    <option value="">-- Khoa trực thuộc --</option>
                    <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                    <option value="Điện - Điện tử">Điện - Điện tử</option>
                    <option value="Kinh tế">Kinh tế</option>
                    <option value="Ngôn ngữ">Ngôn ngữ</option>
                </select>
            </div>

            <div class="mb-3">
                <input type="password" id="password" placeholder="Mật khẩu" class="w-full border border-gray-300 rounded-xl p-3" required>
                <div class="text-xs text-gray-500 mt-1">Ít nhất 8 ký tự, gồm chữ hoa, thường, số, ký tự đặc biệt</div>
            </div>
            <div class="mb-4">
                <input type="password" id="confirm" placeholder="Xác nhận mật khẩu" class="w-full border border-gray-300 rounded-xl p-3" required>
            </div>
            <div id="errorMsg" class="text-red-500 text-sm mb-3 hidden"></div>
            <button type="submit" class="btn-primary w-full text-white py-3 rounded-xl font-semibold shadow-md">Đăng ký</button>
        </form>
        <div class="text-center mt-5">
            <a href="login.html" class="text-blue-600 hover:text-blue-800 text-sm font-medium">← Quay lại đăng nhập</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        const roleSelect = document.getElementById('role');
        const facultyGroup = document.getElementById('facultyGroup');
        const lecturerFields = document.getElementById('lecturerFields');

        function toggleFields() {
            const role = roleSelect.value;
            facultyGroup.classList.add('hidden');
            lecturerFields.classList.add('hidden');
            if (role === 'faculty') facultyGroup.classList.remove('hidden');
            if (role === 'lecturer') lecturerFields.classList.remove('hidden');
        }
        roleSelect.addEventListener('change', toggleFields);
        toggleFields();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const role = roleSelect.value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.classList.add('hidden');

            if (!fullName || !username || !password) {
                errorDiv.textContent = 'Vui lòng điền đầy đủ họ tên, tên đăng nhập và mật khẩu.';
                errorDiv.classList.remove('hidden');
                return;
            }
            if (password !== confirm) {
                errorDiv.textContent = 'Mật khẩu xác nhận không khớp.';
                errorDiv.classList.remove('hidden');
                return;
            }
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordRegex.test(password)) {
                errorDiv.textContent = 'Mật khẩu phải có ít nhất 8 ký tự, bao gồm chữ hoa, thường, số và ký tự đặc biệt.';
                errorDiv.classList.remove('hidden');
                return;
            }

            const payload = { username, password, fullName, role };

            if (role === 'faculty') {
                const facultyName = document.getElementById('facultyName').value;
                if (!facultyName) {
                    errorDiv.textContent = 'Vui lòng chọn khoa.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                payload.facultyName = facultyName;
            }
            if (role === 'lecturer') {
                const department = document.getElementById('department').value;
                const lecturerCode = document.getElementById('lecturerCode').value.trim();
                const birthDate = document.getElementById('birthDate').value;
                if (!department) {
                    errorDiv.textContent = 'Vui lòng chọn khoa trực thuộc.';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                payload.department = department;
                if (lecturerCode) payload.lecturerCode = lecturerCode;
                if (birthDate) payload.birthDate = birthDate;
            }

            try {
                const res = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    alert('Đăng ký thành công! Vui lòng đăng nhập.');
                    window.location.href = 'login.html';
                } else {
                    errorDiv.textContent = data.message || 'Đăng ký thất bại.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Lỗi kết nối server.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
