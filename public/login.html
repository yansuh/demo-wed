<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập · Hệ thống Quản lý Học vụ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f2b3d 0%, #1b4a6e 100%);
            background-attachment: fixed;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.08"><path fill="white" d="M20,30 L30,20 L40,30 L30,40 Z M60,70 L70,60 L80,70 L70,80 Z M80,20 L90,15 L85,25 Z M10,80 L20,75 L15,85 Z"/><circle cx="50" cy="50" r="3"/><circle cx="85" cy="85" r="2"/><circle cx="15" cy="15" r="2"/></svg>');
            background-repeat: repeat;
            background-size: 32px;
            pointer-events: none;
        }
        .card {
            backdrop-filter: blur(2px);
            background: rgba(255, 255, 255, 0.98);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
        }
        input:focus, select:focus {
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
            border-color: #3b82f6;
        }
        .btn-primary {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #1d4ed8, #1e3a8a);
            transform: scale(1.01);
            box-shadow: 0 10px 20px -5px rgba(37,99,235,0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-md card rounded-2xl shadow-2xl p-8 relative z-10">
        <div class="text-center mb-6">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto shadow-lg">
                <i class="fas fa-graduation-cap text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold mt-4 text-gray-800">Quản lý học vụ</h2>
            <p class="text-gray-500 text-sm">Đăng nhập hệ thống</p>
        </div>
        <form id="loginForm">
            <div class="mb-4">
                <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none transition" required>
            </div>
            <div class="mb-4">
                <input type="password" id="password" placeholder="Mật khẩu" class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none transition" required>
            </div>
            <div id="errorMsg" class="text-red-500 text-sm mb-3 hidden"></div>
            <button type="submit" class="btn-primary w-full text-white py-3 rounded-xl font-semibold shadow-md">Đăng nhập</button>
        </form>
        <div class="text-center mt-5">
            <a href="register.html" class="text-blue-600 hover:text-blue-800 text-sm font-medium">Chưa có tài khoản? Đăng ký ngay →</a>
        </div>
        <div class="mt-6 pt-4 border-t border-gray-100 text-center text-xs text-gray-400">
            © 2025 Hệ thống Quản lý Học vụ
        </div>
    </div>

    <script>
        // Khởi tạo dữ liệu mặc định
        if (!localStorage.getItem('users')) {
            const defaultUsers = [
                { id: 1, username: 'admin', password: '123', fullName: 'Quản trị viên', role: 'admin' },
                { id: 2, username: 'training', password: '123', fullName: 'Phòng đào tạo', role: 'training' },
                { id: 3, username: 'gv1', password: '123', fullName: 'Nguyễn Văn A', role: 'lecturer' },
                { id: 4, username: 'khoa_cntt', password: '123', fullName: 'Khoa CNTT', role: 'faculty', facultyName: 'Công nghệ thông tin' }
            ];
            localStorage.setItem('users', JSON.stringify(defaultUsers));
        }
        if (!localStorage.getItem('nextIds')) {
            localStorage.setItem('nextIds', JSON.stringify({ userId: 5, subjectId: 4, requestId: 1 }));
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                const { password, ...safeUser } = user;
                sessionStorage.setItem('loggedUser', JSON.stringify(safeUser));
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.textContent = 'Sai tên đăng nhập hoặc mật khẩu';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
